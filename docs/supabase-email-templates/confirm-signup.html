<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>メールアドレスの確認</title>
</head>
<body style="margin:0;padding:0;background-color:#f5f0e8;font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#f5f0e8;padding:40px 20px;">
    <tr>
      <td align="center">
        <table width="100%" cellpadding="0" cellspacing="0" style="max-width:480px;background-color:#faeeda;border-radius:20px;overflow:hidden;box-shadow:0 4px 24px rgba(133,79,11,0.08);">

          <!-- ヘッダー -->
          <tr>
            <td style="background-color:#854f0b;padding:32px 40px;text-align:center;">
              <p style="margin:0;font-size:28px;font-weight:900;color:#faeeda;letter-spacing:-0.5px;">okitegami</p>
              <p style="margin:6px 0 0;font-size:13px;color:#faeeda;opacity:0.6;">あなたの言葉を、街に置いていこう</p>
            </td>
          </tr>

          <!-- 本文 -->
          <tr>
            <td style="padding:40px 40px 32px;">
              <h1 style="margin:0 0 16px;font-size:22px;font-weight:900;color:#854f0b;letter-spacing:-0.3px;">メールアドレスの確認</h1>
              <p style="margin:0 0 24px;font-size:15px;color:#854f0b;opacity:0.75;line-height:1.7;">
                okitegami へのご登録ありがとうございます。<br>
                下のボタンをタップして、メールアドレスを確認してください。
              </p>

              <!-- ボタン -->
              <table cellpadding="0" cellspacing="0" style="margin:0 0 24px;">
                <tr>
                  <td style="background-color:#854f0b;border-radius:100px;">
                    <a href="{{ .ConfirmationURL }}"
                       style="display:inline-block;padding:14px 32px;font-size:16px;font-weight:700;color:#faeeda;text-decoration:none;letter-spacing:0.2px;">
                      メールアドレスを確認する
                    </a>
                  </td>
                </tr>
              </table>

              <p style="margin:0;font-size:13px;color:#854f0b;opacity:0.5;line-height:1.6;">
                ボタンが押せない場合は、以下の URL をブラウザに貼り付けてください。<br>
                <span style="word-break:break-all;">{{ .ConfirmationURL }}</span>
              </p>
            </td>
          </tr>

          <!-- フッター -->
          <tr>
            <td style="padding:20px 40px 32px;border-top:1px solid rgba(133,79,11,0.1);">
              <p style="margin:0;font-size:12px;color:#854f0b;opacity:0.4;line-height:1.7;">
                このメールに心当たりがない場合は、無視していただいて問題ありません。<br>
                送信元: noreply@nectere.jp
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
